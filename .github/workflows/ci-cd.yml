name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1️⃣ Code Quality & Testing
  test-and-quality:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval: 10s
          --health-timeout: 5s
          --health-retries: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Generate package-lock.json
        working-directory: ./backend
        run: npm install --package-lock-only

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./RideX
        run: npm install

  # 2️⃣ Build & Deploy
  build-and-deploy:
    needs: test-and-quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and test backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ridex-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test backend container
        run: |
          docker run --rm -d --name test-backend -p 5000:5000 ridex-backend:test
          sleep 10
          curl -f http://localhost:5000/ || exit 1
          docker stop test-backend

      - name: Build and test frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./RideX
          file: ./RideX/Dockerfile
          push: false
          load: true
          tags: ridex-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ridex-backend:test
          format: 'sarif'
          output: 'trivy-backend-results.sarif'

      - name: Security scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ridex-frontend:test
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-backend-results.sarif'

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./RideX
          file: ./RideX/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}

  # 3️⃣ Deploy to Staging (DISABLED)
  # deploy-staging:
  #   needs: build-and-deploy
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /home/${{ secrets.STAGING_USER }}/ridex-staging
            docker-compose -f docker-compose.staging.yml down
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
            docker-compose -f docker-compose.staging.yml up -d
            echo "Staging deployment completed"

      - name: Run integration tests on staging
        run: |
          sleep 30
          curl -f ${{ secrets.STAGING_URL }}/api/ || exit 1
          curl -f ${{ secrets.STAGING_URL }}/ || exit 1

  # 4️⃣ Deploy to Production
  deploy-production:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/ridex
            
            # Create directory if not exists
            mkdir -p /home/${{ secrets.SERVER_USER }}/ridex
            
            # Copy docker-compose file
            cat > docker-compose.yml << 'EOF'
version: '3.8'

services:
  ridex-backend:
    image: ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
    container_name: ridex-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ridex
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  ridex-frontend:
    image: ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
    container_name: ridex-frontend
    ports:
      - "80:5173"
    depends_on:
      - ridex-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:6.0
    container_name: ridex-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping: 1})"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
EOF
            
            # Create backup
            echo "Creating backup..."
            docker-compose down
            
            # Pull new images
            echo "Pulling new images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
            
            # Start new containers
            echo "Starting new containers..."
            docker-compose up -d
            
            # Health checks
            echo "Waiting for health checks..."
            sleep 45
            
            # Check service health
            BACKEND_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ridex-backend 2>/dev/null || echo "unknown")
            FRONTEND_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ridex-frontend 2>/dev/null || echo "unknown")
            
            echo "Backend health: $BACKEND_HEALTH"
            echo "Frontend health: $FRONTEND_HEALTH"
            
            # Rollback if unhealthy
            if [[ "$BACKEND_HEALTH" != "healthy" || "$FRONTEND_HEALTH" != "healthy" ]]; then
              echo "Health check failed. Rolling back..."
              docker-compose down
              
              # Pull previous images
              docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-backend:previous || echo "No previous backend image"
              docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:previous || echo "No previous frontend image"
              
              # Update to previous version
              if docker images | grep -q "ridex-backend.*previous"; then
                sed -i 's/:latest/:previous/g' docker-compose.yaml
              fi
              
              docker-compose up -d
              echo "Rollback completed"
              exit 1
            fi
            
            # Tag current as previous for next rollback
            docker tag ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest ${{ secrets.DOCKER_USERNAME }}/ridex-backend:previous
            docker tag ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:previous
            docker push ${{ secrets.DOCKER_USERNAME }}/ridex-backend:previous
            docker push ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:previous
            
            # Cleanup
            docker image prune -f
            echo "Production deployment completed successfully!"

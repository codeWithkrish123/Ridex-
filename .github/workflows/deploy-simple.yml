name: Deploy RideX

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./RideX
          file: ./RideX/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/ridex
            
            # Create docker-compose if not exists
            cat > docker-compose.yml << 'EOF'
version: '3.8'

services:
  ridex-backend:
    image: ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
    container_name: ridex-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ridex
    depends_on:
      - mongodb
    restart: unless-stopped

  ridex-frontend:
    image: ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
    container_name: ridex-frontend
    ports:
      - "80:5173"
    depends_on:
      - ridex-backend
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: ridex-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
EOF
            
            # Deploy
            docker-compose down
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
            docker-compose up -d
            docker image prune -f
            echo "Deployment completed!"

name: Deploy RideX

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build & push Backend image
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
          cache-to: type=inline

      # 5️⃣ Build & push Frontend image
      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./RideX  
          file: ./RideX/Dockerfile 
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      # 6️⃣ Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 7️⃣ Deploy to server
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /home/${{ secrets.SERVER_USER }}/ridex
            
            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ridex-frontend:latest
            
            # Stop existing containers
            docker-compose down
            
            # Start new containers
            docker-compose up -d
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"
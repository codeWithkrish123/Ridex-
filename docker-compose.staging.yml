version: "3.9"

services:
  backend:
    image: krish1406/ridex-backend:latest
    container_name: ridex-backend-staging
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      NODE_ENV: staging
    env_file:
      - .env.staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: krish1406/ridex-frontend:latest
    container_name: ridex-frontend-staging
    ports:
      - "5174:5173"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

version: "3.9"

services:
  backend:
    image: krish1406/ridex-backend:latest
    container_name: ridex-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: krish1406/ridex-frontend:latest
    container_name: ridex-frontend
    ports:
      - "80:5173"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s